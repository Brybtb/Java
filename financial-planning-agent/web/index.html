<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Financial Planning Agent</title>
<style>
  :root { --p:#173a5e; --a:#3d7ea6; }
  * { box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; max-width: 780px; margin: 0 auto; padding: 22px; color:#1c1c1c; }
  h1 { color: var(--p); margin-bottom: 2px; }
  .sub { color:#666; margin-top:0; font-size:14px; }
  .tabs { display:flex; gap:8px; margin:12px 0; }
  .tabs button { background:#eef3f8; color:var(--p); border:1px solid var(--a); border-radius:8px; padding:7px 14px; cursor:pointer; font-size:14px; }
  .tabs button.active { background:var(--p); color:#fff; }
  .card { border:1px solid #e2e2e2; border-radius:10px; padding:16px 18px; margin:12px 0; }
  .chat { min-height:280px; display:flex; flex-direction:column; gap:10px; }
  .msg { max-width:80%; padding:9px 13px; border-radius:12px; font-size:14px; line-height:1.4; white-space:pre-wrap; }
  .bot { background:#eef3f8; align-self:flex-start; }
  .me  { background:var(--p); color:#fff; align-self:flex-end; }
  .composer { display:flex; gap:8px; margin-top:12px; }
  .composer input { flex:1; font-size:15px; padding:9px 11px; border:1px solid #ccc; border-radius:8px; }
  button.send { background:var(--p); color:#fff; border:none; border-radius:8px; padding:9px 16px; cursor:pointer; }
  button.secondary { background:var(--a); }
  table{width:100%;border-collapse:collapse;font-size:13px;margin:6px 0}
  th,td{text-align:left;padding:5px 7px;border-bottom:1px solid #eee}
  th{background:var(--p);color:#fff}
  .mods span{display:inline-block;background:#eef3f8;border:1px solid var(--a);color:var(--p);border-radius:7px;padding:3px 8px;margin:2px;font-size:12px}
  .pill{display:inline-block;padding:2px 8px;border-radius:9px;font-size:11px;color:#fff;margin-right:4px}
  .opportunity{background:#2e7d32}.warning{background:#c62828}.caution{background:#ef6c00}.info{background:var(--a)}
  .kpi{display:flex;gap:12px;flex-wrap:wrap;margin:8px 0}
  .kpi div{background:#f4f6f9;border-left:3px solid var(--a);padding:8px 12px;border-radius:4px}
  .kpi b{display:block;font-size:18px;color:var(--p)}
  .disc{background:#fff8e1;border:1px solid #ffe082;color:#5d4037;font-size:12px;padding:8px 10px;border-radius:7px;margin-top:6px}
  .note{font-size:12px;color:#777;margin-top:8px}
</style>
</head>
<body>
  <h1>Financial Planning Agent</h1>
  <p class="sub">An AI-native planning copilot on a deterministic engine — it drives a dynamic
     workflow, and every number it states is provably from the engine (the guard blocks the rest).</p>
  <div class="tabs">
    <button id="tab-copilot" class="active" onclick="show('copilot')">Copilot</button>
    <button id="tab-guided" onclick="show('guided')">Guided form</button>
  </div>

  <div id="copilot" class="card">
    <div id="chat" class="chat"></div>
    <div class="composer">
      <input id="cinput" placeholder="Type your answer…" autocomplete="off">
      <button class="send" onclick="sendCopilot()">Send</button>
    </div>
    <div id="cplan"></div>
    <div class="note">No data is stored; this is a stateless demo. The copilot only states figures returned by the engine.</div>
  </div>

  <div id="guided" class="card" style="display:none">
    <div id="app"></div>
  </div>

<script>
const TODAY = new Date().toISOString().slice(0,10);
function show(which){
  document.getElementById('copilot').style.display = which==='copilot'?'block':'none';
  document.getElementById('guided').style.display = which==='guided'?'block':'none';
  document.getElementById('tab-copilot').classList.toggle('active', which==='copilot');
  document.getElementById('tab-guided').classList.toggle('active', which==='guided');
  if(which==='guided' && !guidedStarted){ guidedStarted=true; step(); }
}
function money(n){ return '$' + Number(n).toLocaleString(undefined,{maximumFractionDigits:0}); }

/* ---------------- Copilot (chat over the dynamic workflow) ---------------- */
let copilotState = null;
let copilotProfile = {};
const chat = document.getElementById('chat');
function bubble(text, who){ const d=document.createElement('div'); d.className='msg '+who; d.textContent=text; chat.appendChild(d); chat.scrollTop=chat.scrollHeight; }

async function copilotTurn(message){
  const body = copilotState ? {state:copilotState, message, trials:2000}
                            : {profile:{}, as_of:TODAY, message, trials:2000};
  const r = await fetch('/api/copilot/turn',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  const d = await r.json();
  if(d.error){ bubble('Error: '+d.error,'bot'); return; }
  copilotState = d.state; copilotProfile = d.state.profile;
  bubble(d.reply, 'bot');
  if(d.status==='ready' && d.result){ renderPlan(d.result, document.getElementById('cplan')); }
}
function sendCopilot(){
  const el=document.getElementById('cinput'); const v=el.value.trim(); if(!v) return;
  bubble(v,'me'); el.value=''; copilotTurn(v);
}
document.getElementById('cinput').addEventListener('keydown',e=>{ if(e.key==='Enter') sendCopilot(); });

/* ---------------- Shared plan renderer ---------------- */
function renderPlan(d, target){
  const mods = (d.workflow?.selected_modules||[]).map(m=>`<span title="${m.reason||''}">${m.id.replace(/_/g,' ')}</span>`).join('');
  let html = `<div class="card"><h2 style="color:var(--p);margin-top:0">Your plan</h2><div class="mods">${mods}</div>`;
  if(d.projection){ const g=d.projection.goal;
    html += `<div class="kpi">
      <div><b>${(g.status||'').replace(/_/g,' ')}</b>goal status</div>
      <div><b>${Math.round(g.funded_ratio*100)}%</b>funded ratio</div>
      ${d.monte_carlo?`<div><b>${Math.round(d.monte_carlo.probability_of_success*100)}%</b>P(success)</div>`:''}
      <div><b>${money(d.projection.balance_at_retirement)}</b>at age ${d.projection.retire_age}</div></div>`; }
  html += `<h3>Recommended next actions</h3><table><tr><th>#</th><th>Action</th><th>Sources</th></tr>` +
    (d.recommendations||[]).map(r=>`<tr><td>${r.step}</td><td>${r.headline}</td><td>${(r.citations||[]).join(', ')}</td></tr>`).join('') + `</table>`;
  const o=d.optimizers||{};
  if(o.risk) html += `<p><b>Risk:</b> tolerance ${o.risk.tolerance_risk_number} vs capacity ${o.risk.capacity_risk_number} vs portfolio ${o.risk.portfolio_risk_number} → ${o.risk.alignment.replace(/_/g,' ')}</p>`;
  if(o.social_security?.recommended_claim_age) html += `<p><b>Social Security:</b> claim at age ${o.social_security.recommended_claim_age}</p>`;
  if(o.estate) html += `<p><b>Estate:</b> projected total estate tax ${money(o.estate.total_projected_estate_tax||o.estate.projected_federal_estate_tax)}</p>`;
  if((d.insights||[]).length){ html += `<h3>Insights</h3>` + d.insights.map(i=>`<div style="margin:3px 0"><span class="pill ${i.severity}">${i.severity}</span>${i.message}</div>`).join(''); }
  html += `<div style="margin:14px 0"><button class="send secondary" onclick="downloadPdf()">Download white-labeled PDF</button></div>`;
  html += (d.disclosures||[]).map(x=>`<div class="disc">${x}</div>`).join('') + `</div>`;
  target.innerHTML = html;
}
async function downloadPdf(){
  const r = await fetch('/api/report.pdf',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({profile:copilotProfile})});
  if(!r.ok){ alert('PDF needs the profile complete.'); return; }
  const b=await r.blob(); const u=URL.createObjectURL(b); const a=document.createElement('a'); a.href=u; a.download='financial_plan.pdf'; a.click(); URL.revokeObjectURL(u);
}

/* ---------------- Guided form (the original dynamic interview) ---------------- */
let guidedStarted=false;
let gProfile={schema_version:"1.0.0",as_of:TODAY}, gTotal=null;
const app=document.getElementById('app');
function setPath(obj,path,val){const p=path.split('.');let c=obj;for(let i=0;i<p.length-1;i++){if(typeof c[p[i]]!=='object'||c[p[i]]===null)c[p[i]]={};c=c[p[i]];}c[p[p.length-1]]=val;}
async function step(){
  const res=await fetch('/api/workflow',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({profile:gProfile,trials:2000})});
  const d=await res.json();
  if(d.error){app.innerHTML=`<div>Error: ${d.error}</div>`;return;}
  if(d.status==='collecting') gQuestion(d); else { copilotProfile=gProfile; renderPlan(d, app); }
}
function gQuestion(d){
  const q=d.next_question; if(gTotal===null) gTotal=d.remaining+1;
  let input;
  if(q.type==='choice') input=`<select id="gans">${q.choices.map(c=>`<option value="${c}">${c.replace(/_/g,' ')}</option>`).join('')}</select>`;
  else if(q.type==='boolean') input=`<select id="gans"><option value="true">Yes</option><option value="false">No</option></select>`;
  else input=`<input id="gans" type="${q.type==='string'?'text':'number'}" step="any">`;
  app.innerHTML=`<div class="q" style="font-weight:600;color:var(--p);margin-bottom:10px">${q.prompt}</div>${input}
    <div style="margin-top:12px"><button class="send" onclick="gSubmit('${q.field}','${q.type}')">Next →</button></div>`;
  const el=document.getElementById('gans'); if(el&&el.focus)el.focus();
  if(el) el.addEventListener('keydown',e=>{if(e.key==='Enter')gSubmit(q.field,q.type);});
}
function gCoerce(v,t){if(t==='boolean')return v==='true';if(t==='integer')return parseInt(v,10);if(t==='number')return parseFloat(v);return v;}
function gSubmit(field,type){const v=document.getElementById('gans').value;setPath(gProfile,field,gCoerce(v,type));step();}

copilotTurn(null);   // greet + ask the first question
</script>
</body>
</html>
