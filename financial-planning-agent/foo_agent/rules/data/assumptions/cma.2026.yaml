# Capital Market Assumptions, versioned. Monte Carlo pins this file's version so
# a probability-of-success figure is always reproducible. Nominal annual figures.
# PLACEHOLDERS pending verification (e.g. against published CMAs); for modeling
# only, never a forecast.
version: "2026.0"
effective_date: "2026-01-01"
expiry_date: null

inflation: 0.025

# Model portfolios keyed by stated risk tolerance.
portfolios:
  conservative:
    mean_return: 0.045
    stdev: 0.07
  moderate:
    mean_return: 0.060
    stdev: 0.11
  aggressive:
    mean_return: 0.075
    stdev: 0.16

# Planning horizon defaults. Couples plan to the last survivor (joint life), so a
# household with a spouse uses the longer joint horizon.
longevity_age: 95
longevity_age_joint: 97
default_retirement_age: 65
# Retirement spending replacement applied to current total expenses if no
# explicit retirement-spend goal is provided.
spending_replacement: 0.80
# Blended effective tax rate applied to portfolio withdrawals in retirement
# (approximates the drag from tax-deferred withdrawals + RMDs). Planning default
# within the effective-rate range for middle-income retirees; verified 2026-06-14
# against IRS federal income-tax rates/brackets [140].
retirement_tax_rate: 0.15
retirement_tax_rate_citations: [140]
# C7: annual return haircut on the TAXABLE bucket only (the "tax cost ratio" of a
# taxable brokerage — dividends + turnover taxed yearly). Tax-deferred and Roth
# buckets compound untaxed and ignore this. ~50 bps sits in the tax-efficient
# equity range; verified 2026-06-14 against Morningstar tax-cost-ratio [138] +
# Vanguard equity asset-location research [139].
taxable_drag: 0.005
taxable_drag_citations: [138, 139]
