<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Financial Planning Agent</title>
<style>
  :root { --p:#173a5e; --a:#3d7ea6; }
  * { box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; max-width: 780px; margin: 0 auto; padding: 22px; color:#1c1c1c; }
  h1 { color: var(--p); margin-bottom: 2px; }
  .sub { color:#666; margin-top:0; font-size:14px; }
  .tabs { display:flex; gap:8px; margin:12px 0; }
  .tabs button { background:#eef3f8; color:var(--p); border:1px solid var(--a); border-radius:8px; padding:7px 14px; cursor:pointer; font-size:14px; }
  .tabs button.active { background:var(--p); color:#fff; }
  .card { border:1px solid #e2e2e2; border-radius:10px; padding:16px 18px; margin:12px 0; }
  .chat { min-height:280px; display:flex; flex-direction:column; gap:10px; }
  .msg { max-width:80%; padding:9px 13px; border-radius:12px; font-size:14px; line-height:1.4; white-space:pre-wrap; }
  .bot { background:#eef3f8; align-self:flex-start; }
  .me  { background:var(--p); color:#fff; align-self:flex-end; }
  .composer { display:flex; gap:8px; margin-top:12px; }
  .composer input { flex:1; font-size:15px; padding:9px 11px; border:1px solid #ccc; border-radius:8px; }
  button.send { background:var(--p); color:#fff; border:none; border-radius:8px; padding:9px 16px; cursor:pointer; }
  button.secondary { background:var(--a); }
  table{width:100%;border-collapse:collapse;font-size:13px;margin:6px 0}
  th,td{text-align:left;padding:5px 7px;border-bottom:1px solid #eee}
  th{background:var(--p);color:#fff}
  .mods span{display:inline-block;background:#eef3f8;border:1px solid var(--a);color:var(--p);border-radius:7px;padding:3px 8px;margin:2px;font-size:12px}
  .pill{display:inline-block;padding:2px 8px;border-radius:9px;font-size:11px;color:#fff;margin-right:4px}
  .opportunity{background:#2e7d32}.warning{background:#c62828}.caution{background:#ef6c00}.info{background:var(--a)}
  .kpi{display:flex;gap:12px;flex-wrap:wrap;margin:8px 0}
  .kpi div{background:#f4f6f9;border-left:3px solid var(--a);padding:8px 12px;border-radius:4px}
  .kpi b{display:block;font-size:18px;color:var(--p)}
  .disc{background:#fff8e1;border:1px solid #ffe082;color:#5d4037;font-size:12px;padding:8px 10px;border-radius:7px;margin-top:6px}
  .note{font-size:12px;color:#777;margin-top:8px}
  .progress{font-size:12px;color:#777;margin-bottom:10px}
  .progress .bar{height:5px;background:#eef3f8;border-radius:3px;margin-top:5px;overflow:hidden}
  .progress .bar i{display:block;height:100%;background:var(--a);border-radius:3px;transition:width .2s}
  .choices{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0}
  .choices button{background:#eef3f8;color:var(--p);border:1px solid var(--a);border-radius:20px;
    padding:9px 15px;cursor:pointer;font-size:14px;text-align:left;line-height:1.25}
  .choices button:hover{background:#dde9f3}
  .choices button.sel{background:var(--p);color:#fff}
  .choices button small{display:block;opacity:.85;font-size:11px;font-weight:400}
  select#gans,input#gans{font-size:15px;padding:9px 11px;border:1px solid #ccc;border-radius:8px;min-width:240px}
  .alt{font-size:12px;color:#777;margin-top:10px}
  .alt input{font-size:13px;padding:6px 9px;border:1px solid #ccc;border-radius:7px;width:160px}
</style>
</head>
<body>
  <h1>Financial Planning Agent</h1>
  <p class="sub">An AI-native planning copilot on a deterministic engine — it drives a dynamic
     workflow, and every number it states is provably from the engine (the guard blocks the rest).</p>
  <div class="tabs">
    <button id="tab-guided" class="active" onclick="show('guided')">Guided plan</button>
    <button id="tab-copilot" onclick="show('copilot')">Chat (AI)</button>
  </div>

  <div id="guided" class="card">
    <div id="app"></div>
  </div>

  <div id="copilot" class="card" style="display:none">
    <div id="chat" class="chat"></div>
    <div class="composer">
      <input id="cinput" placeholder="Type your answer…" autocomplete="off">
      <button class="send" onclick="sendCopilot()">Send</button>
    </div>
    <label class="note" style="display:block"><input type="checkbox" id="aimode"> AI mode (Gemini) — free-form chat; requires GEMINI_API_KEY on the server. Off = deterministic guided Q&amp;A.</label>
    <div id="cplan"></div>
    <div class="note">No data is stored; this is a stateless demo. The copilot only states figures returned by the engine.</div>
  </div>

<script>
const TODAY = new Date().toISOString().slice(0,10);
function show(which){
  document.getElementById('copilot').style.display = which==='copilot'?'block':'none';
  document.getElementById('guided').style.display = which==='guided'?'block':'none';
  document.getElementById('tab-copilot').classList.toggle('active', which==='copilot');
  document.getElementById('tab-guided').classList.toggle('active', which==='guided');
  if(which==='guided' && !guidedStarted){ guidedStarted=true; step(); }
  if(which==='copilot' && !copilotStarted){ copilotStarted=true; copilotTurn(null); }
}
function money(n){ return '$' + Number(n).toLocaleString(undefined,{maximumFractionDigits:0}); }

/* ---------------- Copilot (chat over the dynamic workflow) ---------------- */
let copilotState = null;
let copilotStarted = false;
let copilotProfile = {};
const chat = document.getElementById('chat');
function bubble(text, who){ const d=document.createElement('div'); d.className='msg '+who; d.textContent=text; chat.appendChild(d); chat.scrollTop=chat.scrollHeight; }

async function copilotTurn(message){
  const ai = document.getElementById('aimode') && document.getElementById('aimode').checked;
  const body = copilotState ? {state:copilotState, message, trials:2000, llm:ai}
                            : {profile:{}, as_of:TODAY, message, trials:2000, llm:ai};
  const r = await fetch('/api/copilot/turn',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  const d = await r.json();
  if(d.error){ bubble('Error: '+d.error,'bot'); return; }
  copilotState = d.state; copilotProfile = d.state.profile;
  bubble(d.reply, 'bot');
  if(d.status==='ready' && d.result){ renderPlan(d.result, document.getElementById('cplan')); }
}
function sendCopilot(){
  const el=document.getElementById('cinput'); const v=el.value.trim(); if(!v) return;
  bubble(v,'me'); el.value=''; copilotTurn(v);
}
document.getElementById('cinput').addEventListener('keydown',e=>{ if(e.key==='Enter') sendCopilot(); });

/* ---------------- Shared plan renderer ---------------- */
function fundedPct(x){ const n=Number(x); if(!isFinite(n)) return '—'; const v=Math.round(n*100); if(v>100) return '100%+'; if(v<0) return '0%'; return v+'%'; }   // B8: clamp/guard
function renderPlan(d, target){
  const mods = (d.workflow?.selected_modules||[]).map(m=>`<span title="${_h(m.reason||'')}">${_h(m.id.replace(/_/g,' '))}</span>`).join('');
  let html = `<div class="card"><h2 style="color:var(--p);margin-top:0">Your plan</h2><div class="mods">${mods}</div>`;
  if(d.projection){ const g=d.projection.goal;
    html += `<div class="kpi">
      <div><b>${_h((g.status||'').replace(/_/g,' '))}</b>goal status</div>
      <div><b>${fundedPct(g.funded_ratio)}</b>funded ratio</div>
      ${d.monte_carlo?`<div><b>${fundedPct(d.monte_carlo.probability_of_success)}</b>P(success)</div>`:''}
      <div><b>${money(d.projection.balance_at_retirement)}</b>at age ${d.projection.retire_age}</div></div>`;
    const bk=d.projection.buckets;
    if(bk) html += `<p class="note">At retirement by tax treatment — taxable ${money(bk.taxable)} · tax-deferred ${money(bk.tax_deferred)} · tax-free/Roth ${money(bk.tax_free)} (taxable drag ${(Number(bk.taxable_drag)*100).toFixed(2)}%/yr).</p>`;
    html += projChart(d.projection) + mcCone(d.monte_carlo||{}) + assetMap(d.projection);   // C06 parity
  }
  html += `<h3>Recommended next actions</h3><table><tr><th>#</th><th>Action</th><th>Sources</th></tr>` +
    (d.recommendations||[]).map(r=>`<tr><td>${_h(r.step)}</td><td>${_h(r.headline)}</td><td>${_h((r.citations||[]).join(', '))}</td></tr>`).join('') + `</table>`;
  html += recDetail(d.recommendations);              // C06: per-rec computed detail
  if(d.proposed) html += renderProposed(d.proposed);
  const o=d.optimizers||{};
  if(o.risk) html += `<p><b>Risk:</b> tolerance ${_h(o.risk.tolerance_risk_number)} vs capacity ${_h(o.risk.capacity_risk_number)} vs portfolio ${_h(o.risk.portfolio_risk_number)} → ${_h((o.risk.alignment||'').replace(/_/g,' '))}</p>`;
  if(o.social_security?.recommended_claim_age) html += `<p><b>Social Security:</b> claim at age ${_h(o.social_security.recommended_claim_age)}</p>`;
  if(o.estate) html += `<p><b>Estate:</b> projected total estate tax ${money(o.estate.total_projected_estate_tax||o.estate.projected_federal_estate_tax)}</p>`;
  html += optTables(o);                               // C06: full optimizer tables
  if((d.insights||[]).length){ html += `<h3>Insights</h3>` + d.insights.map(i=>`<div style="margin:3px 0"><span class="pill ${_h(i.severity)}">${_h(i.severity)}</span>${_h(i.message)}</div>`).join(''); }
  html += sourcesList(d.sources);                     // C06: clickable primary sources
  html += `<div style="margin:14px 0"><button class="send secondary" onclick="downloadPdf()">Download white-labeled PDF</button></div>`;
  html += (d.disclosures||[]).map(x=>`<div class="disc">${_h(x)}</div>`).join('') + `</div>`;
  target.innerHTML = html;
}
/* ---------------- Current vs. proposed (C04) ---------------- */
function _pct(x){ return (x==null)?'—':(Math.round(x*1000)/10)+'%'; }
function _signed(x){ if(x==null) return '—'; const v=Math.round(x*1000)/10; return (v>=0?'+':'')+v+' pts'; }
function _h(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function renderProposed(p){
  const b=p.baseline||{}, pr=p.proposed||{}, d=p.delta||{};
  let h=`<h3>Current vs. proposed</h3>
    <p class="note">What changes if you follow the plan. Only actions the projection models move these numbers; the rest are real advice the model can't price yet.</p>
    <table><tr><th>Metric</th><th>Current</th><th>If you follow the plan</th><th>Change</th></tr>
      <tr><td>Funded ratio</td><td>${_pct(b.funded_ratio)}</td><td>${_pct(pr.funded_ratio)}</td><td>${_signed(d.funded_ratio)}</td></tr>
      <tr><td>Probability of success</td><td>${_pct(b.probability_of_success)}</td><td>${_pct(pr.probability_of_success)}</td><td>${_signed(d.probability_of_success)}</td></tr>
    </table>`;
  if((p.steps||[]).length){
    h+=`<table><tr><th>#</th><th>Action</th><th>Δ funded</th><th>Modeled</th></tr>`+
      p.steps.map(s=>`<tr><td>${s.step||''}</td><td>${_h(s.headline||s.rule_id)}</td>`+
        `<td>${s.modeled?_signed(s.delta_funded_ratio):'—'}</td>`+
        `<td>${s.modeled?'yes':('<span class="note">advisory — '+_h(s.reason||'')+'</span>')}</td></tr>`).join('')+`</table>`;
  }
  if(p.decumulation) h+=renderDecum(p.decumulation);
  return `<div style="margin-top:8px">${h}</div>`;
}
function _smoney(x){ if(x==null) return '—'; const v=Math.round(x); return (v>=0?'+':'-')+money(Math.abs(v)); }
function renderDecum(dq){
  const b=dq.baseline||{}, pr=dq.proposed||{}, d=dq.delta||{};
  let h=`<h3>Tax-aware decumulation</h3>
    <p class="note">Drawdown order ${(dq.drawdown_order||[]).join(' → ')}; RMDs begin at age ${dq.rmd_start_age}. Tax assumptions are source-cited planning defaults — confirm each client's bracket, basis, and Social Security inclusion.</p>
    <table><tr><th>Metric</th><th>Current</th><th>If you follow the plan</th><th>Change</th></tr>
      <tr><td>Lifetime tax paid</td><td>${money(b.lifetime_tax_paid)}</td><td>${money(pr.lifetime_tax_paid)}</td><td>${_smoney(d.lifetime_tax_paid)}</td></tr>
      <tr><td>After-tax terminal wealth</td><td>${money(b.after_tax_terminal_wealth)}</td><td>${money(pr.after_tax_terminal_wealth)}</td><td>${_smoney(d.after_tax_terminal_wealth)}</td></tr>
    </table>`;
  const sch=(dq.schedule||[]).slice(0,8);
  if(sch.length){
    h+=`<table><tr><th>Age</th><th>Spend</th><th>RMD</th><th>Ord. tax</th><th>LTCG tax</th><th>Net</th></tr>`+
      sch.map(r=>`<tr><td>${r.age}</td><td>${money(r.spend_target)}</td><td>${money(r.rmd)}</td><td>${money(r.ordinary_tax)}</td><td>${money(r.ltcg_tax)}</td><td>${money(r.net_spendable)}</td></tr>`).join('')+
      `</table><p class="note">Low-bracket years before RMDs/Social Security begin are prime for Roth conversions or 0%-capital-gains harvesting (watch IRMAA). Fund the most tax-efficient bucket next to cut lifetime tax drag.</p>`;
  }
  return h;
}
/* ---------------- C06: on-screen parity with the PDF (charts, tables, sources) ---- */
function projChart(proj){
  const pts=(proj&&proj.path||[]).map(p=>({age:+p.age,bal:+p.balance})).filter(p=>isFinite(p.bal));
  if(pts.length<2) return '';
  const W=620,H=180,P=38, xs=pts.map(p=>p.age), x0=Math.min(...xs),x1=Math.max(...xs),ymax=Math.max(...pts.map(p=>p.bal),1);
  const sx=a=>P+(a-x0)/((x1-x0)||1)*(W-2*P), sy=b=>H-P-(b/ymax)*(H-2*P);
  const poly=pts.map(p=>sx(p.age).toFixed(1)+','+sy(p.bal).toFixed(1)).join(' ');
  const rx=sx(+proj.retire_age);
  return `<h3>Projection</h3><svg viewBox="0 0 ${W} ${H}" width="100%" role="img" aria-label="Projected balance by age">
    <polyline fill="none" stroke="var(--a)" stroke-width="2" points="${poly}"/>
    <line x1="${rx.toFixed(1)}" y1="${P}" x2="${rx.toFixed(1)}" y2="${H-P}" stroke="#c62828" stroke-dasharray="4"/>
    <text x="${rx.toFixed(1)}" y="${P-6}" font-size="10" fill="#c62828" text-anchor="middle">retire ${_h(proj.retire_age)}</text>
    <text x="${P}" y="${H-10}" font-size="10">age ${_h(x0)}</text>
    <text x="${W-P}" y="${H-10}" font-size="10" text-anchor="end">age ${_h(x1)}</text>
    <text x="4" y="${P}" font-size="10">${money(ymax)}</text></svg>`;
}
function mcCone(mc){
  const pc=mc&&mc.ending_balance_percentiles; if(!pc) return '';
  const order=['p90','p75','p50','p25','p10'], max=Number(pc.p90)||1;
  const rows=order.filter(k=>pc[k]!=null).map(k=>{const w=Math.max(1,Math.min(100,Number(pc[k])/max*100));
    return `<div style="display:flex;align-items:center;gap:8px;margin:2px 0"><span class="note" style="width:30px">${_h(k)}</span><span style="background:var(--a);height:12px;width:${w.toFixed(1)}%;display:inline-block;border-radius:2px"></span><span class="note">${money(pc[k])}</span></div>`;}).join('');
  return `<h3>Monte Carlo — ending-balance range <span class="note">(P(success) ${fundedPct(mc.probability_of_success)})</span></h3>${rows}<p class="note">${_h(mc.trials)} trials · ${_h(mc.return_model)} returns · seed ${_h(mc.seed)}</p>`;
}
function assetMap(proj){
  const bk=proj&&proj.buckets; if(!bk) return '';
  const seg=[['Taxable',Number(bk.taxable),'#ef6c00'],['Tax-deferred',Number(bk.tax_deferred),'#3d7ea6'],['Tax-free/Roth',Number(bk.tax_free),'#2e7d32']];
  const tot=seg.reduce((s,x)=>s+(x[1]||0),0)||1;
  const bar=seg.map(([n,v,c])=>v>0?`<span title="${_h(n)} ${money(v)}" style="background:${c};width:${(v/tot*100).toFixed(1)}%;display:inline-block;height:18px"></span>`:'').join('');
  const leg=seg.map(([n,v,c])=>`<span class="note" style="margin-right:12px"><span style="background:${c};display:inline-block;width:10px;height:10px;border-radius:2px"></span> ${_h(n)} ${money(v)}</span>`).join('');
  return `<h3>Asset map (at retirement)</h3><div style="display:flex;border-radius:4px;overflow:hidden">${bar}</div><div style="margin-top:5px">${leg}</div>`;
}
function recDetail(recs){
  const withC=(recs||[]).filter(r=>r.computed&&Object.keys(r.computed).length);
  if(!withC.length) return '';
  return `<h3>Recommendation detail</h3>`+withC.map(r=>{
    const facts=Object.entries(r.computed).filter(([,v])=>typeof v!=='object').slice(0,6)
      .map(([k,v])=>`<span class="note" style="margin-right:12px"><b>${_h(k.replace(/_/g,' '))}</b> ${_h(v)}</span>`).join('');
    return `<div style="margin:6px 0"><b>${_h(r.step)}. ${_h(r.headline)}</b><div>${facts}</div></div>`;
  }).join('');
}
function optTables(o){
  let h='';
  if(o.withdrawal_plan){const wp=o.withdrawal_plan,dr=wp.first_year_draw||{};
    h+=`<h3>Withdrawal plan</h3><p class="note">Order: ${(wp.order||[]).map(_h).join(' → ')} · annual need ${money(wp.annual_need)}</p>
      <table><tr><th>Bucket</th><th>Balance</th><th>First-year draw</th></tr>`+
      Object.keys(wp.buckets||{}).map(b=>`<tr><td>${_h(b.replace(/_/g,' '))}</td><td>${money(wp.buckets[b])}</td><td>${money(dr[b]||0)}</td></tr>`).join('')+`</table>`;}
  if(o.roth_conversion){const rc=o.roth_conversion,ft=rc.fill_targets||[];
    h+=`<h3>Roth conversion</h3><p class="note">Taxable income ${money(rc.taxable_income)} · marginal ${_h(rc.current_marginal_rate)}</p>`;
    if(ft.length) h+=`<table><tr><th>Fill to rate</th><th>Conversion room</th><th>Incremental tax</th></tr>`+
      ft.map(t=>`<tr><td>${_h(t.fill_to_bracket_below_rate)}</td><td>${money(t.conversion_room)}</td><td>${money(t.incremental_tax)}</td></tr>`).join('')+`</table>`;}
  if(o.risk){const rk=o.risk;
    h+=`<h3>Risk</h3><table><tr><th>Tolerance</th><th>Capacity</th><th>Portfolio</th><th>Recommended</th><th>Binding</th></tr>
      <tr><td>${_h(rk.tolerance_risk_number)}</td><td>${_h(rk.capacity_risk_number)}</td><td>${_h(rk.portfolio_risk_number)}</td><td>${_h(rk.recommended_risk_number)}</td><td>${_h((rk.binding_constraint||'').replace(/_/g,' '))}</td></tr></table>`;}
  return h;
}
function sourcesList(s){
  const safe=(s||[]).filter(x=>x&&/^https?:\/\//.test(x.url||''));   // only http(s) links (no javascript:)
  if(!safe.length) return '';
  return `<h3>Sources</h3><div class="note">`+safe.map(x=>`[${_h(x.n)}] <a href="${_h(x.url)}" target="_blank" rel="noopener noreferrer">${_h(x.title||x.url)}</a>`).join('<br>')+`</div>`;
}
async function downloadPdf(){
  const r = await fetch('/api/report.pdf',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({profile:copilotProfile})});
  if(!r.ok){ alert('PDF needs the profile complete.'); return; }
  const b=await r.blob(); const u=URL.createObjectURL(b); const a=document.createElement('a'); a.href=u; a.download='financial_plan.pdf'; a.click(); URL.revokeObjectURL(u);
}

/* ---------------- Guided plan (structured, low-friction intake — C05/NOTE-1) ----
   Default surface. filing status is a pill row; income is a row of bracket-aware
   pills derived from the chosen status's TY2026 marginal brackets; state is a
   picker; a live "Step N of M" counter shows progress. Chat is the fallback tab. */
let guidedStarted=false;
let gProfile={schema_version:"1.0.0",as_of:TODAY};
let gAnswered=0;                                  // questions answered so far (for the counter)
const app=document.getElementById('app');
const US_STATES=["AL","AK","AZ","AR","CA","CO","CT","DE","DC","FL","GA","HI","ID","IL","IN","IA",
  "KS","KY","LA","ME","MD","MA","MI","MN","MS","MO","MT","NE","NV","NH","NJ","NM","NY","NC","ND",
  "OH","OK","OR","PA","RI","SC","SD","TN","TX","UT","VT","VA","WA","WV","WI","WY"];
const esc=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function setPath(obj,path,val){const p=path.split('.');let c=obj;for(let i=0;i<p.length-1;i++){if(typeof c[p[i]]!=='object'||c[p[i]]===null)c[p[i]]={};c=c[p[i]];}c[p[p.length-1]]=val;}
function gCoerce(v,t){if(t==='boolean')return v===true||v==='true';if(t==='integer')return parseInt(v,10);if(t==='number')return parseFloat(v);return v;}

async function step(){
  const res=await fetch('/api/workflow',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({profile:gProfile,trials:2000})});
  const d=await res.json();
  if(d.error){app.innerHTML=`<div>Error: ${esc(d.error)}</div>`;return;}
  if(d.status==='collecting') await gQuestion(d); else { copilotProfile=gProfile; renderPlan(d, app); }
}

function gProgress(d){
  const step=gAnswered+1, total=gAnswered+d.remaining;   // remaining counts the current question
  const pct=Math.round((gAnswered/total)*100);
  return `<div class="progress">Step ${step} of ${total}<div class="bar"><i style="width:${pct}%"></i></div></div>`;
}
function gPrompt(q){return `<div class="q" style="font-weight:600;color:var(--p);margin:4px 0 6px">${esc(q.prompt)}</div>`;}

async function gQuestion(d){
  const q=d.next_question;
  if(q.field==='income.gross_annual'){ return gIncome(d); }     // bracket-aware pills
  let body;
  if(q.type==='choice'){
    body=`<div class="choices">`+q.choices.map(c=>
      `<button onclick="gPick('${q.field}','${q.type}','${esc(c)}')">${esc(c.replace(/_/g,' '))}</button>`).join('')+`</div>`;
  } else if(q.type==='boolean'){
    body=`<div class="choices">
      <button onclick="gPick('${q.field}','boolean','true')">Yes</button>
      <button onclick="gPick('${q.field}','boolean','false')">No</button></div>`;
  } else if(q.field==='household.state'){
    body=`<select id="gans">${US_STATES.map(s=>`<option value="${s}">${s}</option>`).join('')}</select>
      <div style="margin-top:12px"><button class="send" onclick="gSubmit('${q.field}','string')">Next →</button></div>`;
  } else {
    body=`<input id="gans" type="${q.type==='string'?'text':'number'}" step="any">
      <div style="margin-top:12px"><button class="send" onclick="gSubmit('${q.field}','${q.type}')">Next →</button></div>`;
  }
  app.innerHTML=gProgress(d)+gPrompt(q)+body;
  const el=document.getElementById('gans'); if(el&&el.focus)el.focus();
  if(el) el.addEventListener('keydown',e=>{if(e.key==='Enter')gSubmit(q.field,q.type);});
}

async function gIncome(d){
  const q=d.next_question, fs=gProfile.household&&gProfile.household.filing_status;
  app.innerHTML=gProgress(d)+gPrompt(q)+`<div class="note">Loading tax brackets…</div>`;
  let bands=null;
  try{
    const r=await fetch(`/api/intake/brackets?filing_status=${encodeURIComponent(fs)}&as_of=${gProfile.as_of}`);
    if(r.ok) bands=(await r.json()).bands;
  }catch(e){ bands=null; }
  let body;
  if(bands&&bands.length){
    body=`<div class="choices">`+bands.map(b=>
      `<button onclick="gPick('income.gross_annual','number',${b.value})">${esc(b.label)}
        <small>${b.marginal_rate_pct}% marginal bracket</small></button>`).join('')+`</div>
      <div class="alt">Exact amount instead:
        <input id="gans" type="number" step="any" placeholder="e.g. 120000">
        <button class="send" onclick="gSubmit('income.gross_annual','number')">Use →</button></div>`;
  } else {
    body=`<input id="gans" type="number" step="any">
      <div style="margin-top:12px"><button class="send" onclick="gSubmit('income.gross_annual','number')">Next →</button></div>`;
  }
  app.innerHTML=gProgress(d)+gPrompt(q)+body;
}

function gPick(field,type,val){ gAnswered++; setPath(gProfile,field,gCoerce(val,type)); step(); }
function gSubmit(field,type){
  const v=document.getElementById('gans').value;
  if(v===''||v===null) return;
  gAnswered++; setPath(gProfile,field,gCoerce(v,type)); step();
}

step();   // guided plan is the default surface; render the first question
</script>
</body>
</html>
