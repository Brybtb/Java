name: ci

# Lives at the REPO ROOT (foo-planner/.github/workflows) because GitHub only runs
# workflows there — the package is nested at financial-planning-agent/, so a
# workflow inside that subdir is silently ignored. All steps run in the package dir.
on:
  push:
    branches: ["chunk/**", "claude/**", "master"]
  pull_request:
    branches: ["claude/**", "master"]

defaults:
  run:
    working-directory: financial-planning-agent

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: System deps for WeasyPrint (PDF repro tests)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libpango-1.0-0 libpangocairo-1.0-0 \
            libgdk-pixbuf-2.0-0 libcairo2 libffi-dev
      # No GEMINI_API_KEY on purpose: tests stub the LLM and conftest blocks egress,
      # so the live Gemini path is never exercised in CI.
      - name: Install package + dev deps
        run: python -m pip install -e ".[dev]"
      - name: Run test suite
        run: python -m pytest -q
