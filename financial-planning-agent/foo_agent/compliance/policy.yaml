# Compliance policy for the RIA/advisor decision-support posture.
# Every Result is stamped with these. The report layer refuses to render without
# the disclosures present.
requires_advisor_review: true

disclosures:
  - >-
    Educational decision-support only. This analysis is generated by a
    deterministic rules engine and is NOT personalized investment, tax, legal, or
    insurance advice. It must be reviewed and approved by a qualified fiduciary
    adviser before being relied upon or shared with a client.
  - >-
    Recommendations follow a general Financial Order of Operations and the
    assumptions, contribution limits, and tax parameters in effect for the stated
    "as of" date. Individual circumstances may change the appropriate order.
  - >-
    Any Monte Carlo "probability of success" is a modeled estimate based on the
    stated capital-market assumptions and a fixed random seed; it is not a
    guarantee of future results. Markets may behave outside the modeled range.
  - >-
    Sources are cited for each rule. Confirm any figure against its linked primary
    source (IRS, SSA, statute) before acting.

# SEC Marketing Rule awareness: no performance promises, no cherry-picked
# hypotheticals presented as typical, balanced presentation of assumptions.
marketing_rule:
  prohibit_performance_guarantees: true
  require_assumption_disclosure: true
