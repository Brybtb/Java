name: ci

on:
  push:
    branches: ["chunk/**", "claude/**", "master"]
  pull_request:
    branches: ["claude/**", "master"]

# No GEMINI_API_KEY is provided to CI on purpose: tests stub the LLM
# (tests/test_agents.py) and tests/conftest.py blocks external network calls,
# so the live Gemini path is never exercised here.
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: System deps for WeasyPrint (PDF repro tests)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libpango-1.0-0 libpangocairo-1.0-0 \
            libgdk-pixbuf-2.0-0 libcairo2 libffi-dev
      - name: Install package + dev deps
        run: python -m pip install -e ".[dev]"
      - name: Run test suite
        run: python -m pytest -q
