# US federal base parameters + global engine defaults, versioned by effective_date.
# IMPORTANT: dollar figures are PLACEHOLDERS for the 2026 tax year pending
# verification by research/verify_assumptions.py against IRS/SSA primary sources.
# The engine selects the version whose [effective_date, expiry_date) brackets as_of.
versions:
  - effective_date: "2026-01-01"
    expiry_date: null

    emergency_fund:
      starter_months: 1
      starter_floor: 1000
      starter_monthly: 250
      full_months: 6
      full_monthly: 500

    debt:
      high_interest_apr_threshold: 0.08

    protection:
      life_income_multiple: 10

    contribution_limits:
